<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>茅聸聙莽楼聻猫庐掳猫麓娄忙聹卢</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f1a;--card:#1a1a2e;--gold:#d4a843;--gold2:#f5d78c;--text:#e8e8ec;--text2:#8888a0;--red:#e74c3c;--green:#27ae60;--blue:#3498db;--border:#2a2a40;--radius:12px}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;justify-content:center;-webkit-tap-highlight-color:transparent}
#app{width:100%;max-width:420px;min-height:100dvh;display:flex;flex-direction:column;padding:12px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;color:#fff;background:var(--gold)}
.btn:active{transform:scale(.96)}
.btn2{background:#1e1e3a;color:var(--text)}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:6px}
.btn-red{background:var(--red)}
.input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:15px;outline:none}
.input:focus{border-color:var(--gold)}
.label{font-size:13px;color:var(--text2);margin-bottom:6px;display:block}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:99;padding:10px 24px;border-radius:20px;font-size:13px;font-weight:600;animation:tIn .3s,tOut .3s 2s forwards;pointer-events:none}
@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(-12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes tOut{from{opacity:1}to{opacity:0}}
.t-ok{background:var(--green)}.t-err{background:var(--red)}.t-info{background:var(--blue)}
.t-center{text-align:center;padding:40px 0}
.c-card{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:10px;border:1px solid var(--border)}
.c-title{font-size:15px;font-weight:700;margin-bottom:10px;color:var(--gold2)}
.c-small{font-size:12px;color:var(--text2)}
.row{display:flex;align-items:center;gap:8px}.row-b{display:flex;align-items:center;justify-content:space-between}
.gap8{gap:8px}.mt8{margin-top:8px}.mt12{margin-top:12px}.mb8{margin-bottom:8px}
.grid2x2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.p-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center;cursor:pointer;transition:.15s;min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.p-card:active{transform:scale(.97)}
.p-card.winner{border-color:var(--gold);box-shadow:0 0 12px rgba(212,168,67,.25)}
.p-card.empty{opacity:.45;cursor:default;border-style:dashed}
.p-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px;background:linear-gradient(135deg,#1e2a4a,#2a3a5a);margin-bottom:6px;color:#fff}
.p-name{font-size:14px;font-weight:600;margin-bottom:2px}
.p-score{font-size:20px;font-weight:700}.p-score.plus{color:var(--green)}.p-score.minus{color:var(--red)}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-gold{background:rgba(212,168,67,.15);color:var(--gold)}
.badge-blue{background:rgba(52,152,219,.15);color:var(--blue)}
.badge-red{background:rgba(231,76,60,.15);color:var(--red)}
.badge-warn{background:rgba(231,76,60,.12);color:var(--red);padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600}
.pay-row{display:flex;align-items:center;gap:6px;margin-top:6px;width:100%}
.pay-row input{flex:1;min-width:0;height:30px;padding:4px 6px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:13px;text-align:center;outline:none}
.pay-row input:focus{border-color:var(--gold)}
.qr-box{text-align:center;padding:12px 0}
.qr-box img{width:180px;height:180px;border-radius:8px;border:4px solid #fff;background:#fff}
.modal-o{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--card);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:420px;max-height:80vh;overflow-y:auto;padding:20px 16px;animation:up .25s}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:17px;font-weight:700;margin-bottom:14px;color:var(--gold2)}
.divider{height:1px;background:var(--border);margin:10px 0}
.bankrupt-banner{background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.25);border-radius:var(--radius);padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
</style>
</head>
<body>
<div id="app"></div>
<div id="toasts"></div>

<script>
(function(){
var SB_URL='https://apueeywuobvgrekaxowa.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFwdWVleXd1b2J2Z3Jla2F4b3dhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0OTY0NTksImV4cCI6MjA5OTA3MjQ1OX0.b0n9J8iHgcbL_E6Ahphmy1Dr1K0NxJBdAhM4UiaP_HY';
var POLL_MS=2500;

function $(id){return document.getElementById(id)}
function el(t,c,h){var e=document.createElement(t);if(c)e.className=c;if(h!==undefined)e.innerHTML=h;return e}
function fmt(n){return n>=0?'+'+n:''+n}
function fmtDate(d){var t=new Date(d);return t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0')}
function genId(){return Math.random().toString(36).substr(2,6)+Date.now().toString(36).substr(-4)}
function esc(s){return(String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function toast(msg,cls){
  cls=cls||'t-info';var d=el('div','toast '+cls,msg);$('toasts').appendChild(d);
  setTimeout(function(){d.remove()},2500);
}

var headers={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'};
async function sbGet(id){
  var r=await fetch(SB_URL+'/rest/v1/rooms?id=eq.'+encodeURIComponent(id),{headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY}});
  if(!r.ok)throw new Error('GET '+r.status);var d=await r.json();return d[0]||null
}
async function sbGetByCode(code){
  var r=await fetch(SB_URL+'/rest/v1/rooms?code=eq.'+encodeURIComponent(code),{headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY}});
  if(!r.ok)throw new Error('GET '+r.status);var d=await r.json();return d[0]||null
}
async function sbPost(room){
  var r=await fetch(SB_URL+'/rest/v1/rooms',{method:'POST',headers:headers,body:JSON.stringify(room)});
  if(!r.ok)throw new Error('POST '+r.status)
}
async function sbPatch(id,data){
  var r=await fetch(SB_URL+'/rest/v1/rooms?id=eq.'+encodeURIComponent(id),{method:'PATCH',headers:headers,body:JSON.stringify(data)});
  if(!r.ok)throw new Error('PATCH '+r.status)
}

var myRoomId=localStorage.getItem('mj_room_id')||'';
var myName=localStorage.getItem('mj_name')||'';
var myRoom=null,selectedWinner=null,pollTimer=null,view='join';

function saveState(){localStorage.setItem('mj_room_id',myRoomId);localStorage.setItem('mj_name',myName)}
function clearState(){myRoomId='';myName='';localStorage.removeItem('mj_room_id');localStorage.removeItem('mj_name')}

async function pollRoom(){
  if(!myRoomId)return;
  try{myRoom=await sbGet(myRoomId);if(!myRoom){clearState();view='join';render()}else{render()}}catch(e){}
}
function startPoll(){stopPoll();pollTimer=setInterval(pollRoom,POLL_MS)}
function stopPoll(){if(pollTimer){clearInterval(pollTimer);pollTimer=null}}

function render(){
  $('app').innerHTML='';
  if(view==='join')renderJoin();else if(view==='room')renderRoom();else if(view==='stats')renderStats();
}

// ========== JOIN ==========
function renderJoin(){
  stopPoll();myRoom=null;selectedWinner=null;
  var params=new URLSearchParams(location.search);
  var urlCode=params.get('code')||'';

  var h='<div style="text-align:center;padding:40px 0 30px;"><div style="font-size:48px;margin-bottom:8px;">冒聼聙聞</div>';
  h+='<h2>茅聸聙莽楼聻猫庐掳猫麓娄忙聹卢</h2><p class="c-small mt8">猫戮聯氓聟楼氓聬聧氓颅聴氓聤聽氓聟楼忙聢驴茅聴麓茂录聦猫聡陋氓聤篓猫庐掳猫麓娄</p></div>';
  h+='<div class="c-card"><div class="label">盲陆聽莽職聞氓聬聧氓颅聴</div>';
  h+='<input class="input" id="join-name" placeholder="猫戮聯氓聟楼氓聬聧氓颅聴" value="'+esc(myName||'')+'" autocomplete="off">';
  h+='</div>';
  h+='<div class="c-card"><div class="label">忙聢驴茅聴麓莽聽聛</div>';
  h+='<input class="input" id="join-code" placeholder="猫戮聯氓聟楼4盲陆聧忙聢驴茅聴麓莽聽聛" maxlength="4" style="text-transform:uppercase;letter-spacing:4px;text-align:center;font-size:24px;" value="'+esc(urlCode)+'" autocomplete="off">';
  h+='</div>';
  h+='<button class="btn" style="width:100%;font-size:16px;padding:14px;" id="btn-join">氓聤聽氓聟楼忙聢驴茅聴麓</button>';
  h+='<button class="btn btn2" style="width:100%;margin-top:8px;font-size:14px;padding:12px;" id="btn-create">氓聢聸氓禄潞忙聳掳忙聢驴茅聴麓</button>';
  if(myRoomId)h+='<p class="c-small t-center mt8">盲陆聽氓路虏氓聹篓忙聢驴茅聴麓盲赂颅 <a href="#" id="btn-rejoin" style="color:var(--gold);">莽聸麓忙聨楼猫驴聸氓聟楼</a></p>';
  $('app').innerHTML=h;

  $('btn-join').addEventListener('click',function(){doJoin(false)});
  $('btn-create').addEventListener('click',function(){doJoin(true)});
  var inp=$('join-code');if(inp)inp.addEventListener('keydown',function(e){if(e.key==='Enter')doJoin(false)});
  var rj=$('btn-rejoin');if(rj)rj.addEventListener('click',function(e){e.preventDefault();view='room';startPoll();render();pollRoom()});
}

async function doJoin(isNew){
  var name=$('join-name').value.trim();
  if(!name){toast('猫炉路猫戮聯氓聟楼氓聬聧氓颅聴','t-err');return}
  myName=name;

  if(isNew){
    // 氓聢聸氓禄潞忙聳掳忙聢驴茅聴麓
    try{
      var code;var exists=true;
      while(exists){code=genId().substr(0,4).toUpperCase();var r=await sbGetByCode(code);if(!r)exists=false}
      var id=genId();myRoomId=id;
      var room={id:id,code:code,status:'waiting',players:[{name:name,score:0,position:0,active:true,joined:new Date().toISOString()}],
        session_number:1,session_data:{transactions:[]},daily_stats:{},created_at:new Date().toISOString(),updated_at:new Date().toISOString()};
      await sbPost(room);
      saveState();view='room';startPoll();render();
      toast('忙聢驴茅聴麓 '+code+' 氓路虏氓聢聸氓禄潞','t-ok');
    }catch(e){toast('氓聢聸氓禄潞氓陇卤猫麓楼','t-err');console.error(e)}
    return;
  }

  var code=$('join-code').value.trim().toUpperCase();
  if(!code){toast('猫炉路猫戮聯氓聟楼忙聢驴茅聴麓莽聽聛','t-err');return}
  try{
    var room=await sbGetByCode(code);
    if(!room){toast('忙聢驴茅聴麓莽聽聛盲赂聧氓颅聵氓聹篓','t-err');return}
    var activePlayers=room.players.filter(function(p){return p.active});
    if(activePlayers.length>=4){toast('忙聢驴茅聴麓氓路虏忙禄隆','t-err');return}
    // 忙聸驴忙聧垄莽漏潞盲陆聧忙聢聳猫驴陆氓聤聽
    var replaced=false;
    room.players=room.players.map(function(p,idx){
      if(!p.active&&!replaced){replaced=true;return{name:name,score:0,position:idx,active:true,joined:new Date().toISOString()}}
      return p;
    });
    if(!replaced){room.players.push({name:name,score:0,position:room.players.length,active:true,joined:new Date().toISOString()})}
    activePlayers=room.players.filter(function(p){return p.active});
    room.status=activePlayers.length===4?'playing':'waiting';
    room.updated_at=new Date().toISOString();
    await sbPatch(room.id,{players:room.players,status:room.status,updated_at:room.updated_at});
    myRoomId=room.id;saveState();view='room';startPoll();render();pollRoom();
    history.replaceState({},'',location.pathname);
    toast('氓路虏氓聤聽氓聟楼 '+code,'t-ok');
  }catch(e){toast('氓聤聽氓聟楼氓陇卤猫麓楼','t-err');console.error(e)}
}

// ========== ROOM ==========
function renderRoom(){
  if(!myRoom){renderJoin();return}
  var room=myRoom,activePlayers=room.players.filter(function(p){return p.active}),sData=room.session_data||{transactions:[]};
  var isMeWinner=selectedWinner===myName;
  var link=location.origin+location.pathname+'?code='+room.code;

  var h='';
  // 茅隆露忙聽聫
  h+='<div class="row-b mb8"><div class="row gap8"><span style="font-size:22px;font-weight:700;letter-spacing:3px;">'+esc(room.code)+'</span>';
  h+='<span class="badge '+(room.status==='playing'?'badge-gold':'badge-blue')+'">'+(room.status==='playing'?'忙赂赂忙聢聫盲赂颅':'莽颅聣氓戮聟盲赂颅')+'</span>';
  h+='<span class="badge badge-blue">莽卢卢'+room.session_number+'氓卤聙</span></div>';
  h+='<div class="row gap8"><button class="btn btn-sm btn2" id="btn-share">氓聢聠盲潞芦</button>';
  h+='<button class="btn btn-sm btn2 btn-red" id="btn-leave">茅聙聙氓聡潞</button></div></div>';

  // 莽颅聣氓戮聟盲赂颅忙聵戮莽陇潞盲潞聦莽禄麓莽聽聛
  if(activePlayers.length<4){
    var remain=4-activePlayers.length;
    h+='<div class="c-card" style="text-align:center;padding:16px;">';
    h+='<div style="font-size:15px;font-weight:600;margin-bottom:10px;color:var(--gold2);">猫驴聵氓路庐 '+remain+' 盲潞潞茂录聦氓戮庐盲驴隆忙聣芦莽聽聛氓聤聽氓聟楼</div>';
    h+='<div class="qr-box"><img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data='+encodeURIComponent(link)+'" alt="QR"></div>';
    h+='<div class="c-small mt8">忙聢驴茅聴麓莽聽聛 <b style="color:var(--gold);font-size:18px;letter-spacing:3px;">'+esc(room.code)+'</b></div>';
    h+='</div>';
  }

  // 莽聽麓盲潞搂忙聫聬莽陇潞
  var bankrupts=activePlayers.filter(function(p){return(p.score||0)<=-2000});
  if(bankrupts.length>0){
    h+='<div class="bankrupt-banner"><span style="font-size:13px;">'+esc(bankrupts[0].name)+' 莽颅鹿莽聽聛芒聣陇-2000茂录聦莽聜鹿氓聡禄莽禄聯莽庐聴氓录聙忙聳掳氓卤聙</span><button class="btn btn-sm btn-red" id="btn-new-round">忙聳掳氓卤聙</button></div>';
  }

  // 2x2 莽聨漏氓庐露氓聧隆莽聣聡
  h+='<div class="grid2x2 mb8">';
  for(var i=0;i<4;i++){
    var p=room.players.find(function(x){return x.position===i});
    if(p&&p.active){
      var score=p.score||0,isW=selectedWinner===p.name;
      h+='<div class="p-card'+(isW?' winner':'')+'" data-player="'+esc(p.name)+'">';
      h+='<div class="p-avatar">'+esc(p.name[0])+'</div><div class="p-name">'+esc(p.name)+'</div>';
      h+='<div class="p-score '+(score>0?'plus':score<0?'minus':'')+'">'+fmt(score)+'</div>';
      if(room.status==='playing'&&selectedWinner&&!isW&&!isMeWinner){
        h+='<div class="pay-row"><input type="number" class="pay-input" data-to="'+esc(p.name)+'" placeholder="忙聰炉氓聡潞" min="0" step="1" inputmode="numeric">';
        h+='<span style="font-size:11px;color:var(--text2);white-space:nowrap;">芒聠聮'+esc(selectedWinner)+'</span></div>';
      }
      h+='</div>';
    }else{
      h+='<div class="p-card empty"><div class="p-avatar" style="opacity:.3;">+</div><div style="font-size:13px;color:var(--text2);">莽颅聣氓戮聟忙聣芦莽聽聛</div></div>';
    }
  }
  h+='</div>';

  // 忙聯聧盲陆聹氓聦潞
  if(room.status==='playing'&&activePlayers.length===4){
    if(!selectedWinner){
      h+='<div class="c-card t-center" style="padding:12px;"><span style="font-size:14px;color:var(--text2);">莽聜鹿氓聡禄猫碌垄氓庐露氓陇麓氓聝聫 芒聠聮 氓聟露盲禄聳盲潞潞猫戮聯氓聟楼忙聰炉氓聡潞茅聡聭茅垄聺</span></div>';
    }else{
      h+='<div class="row gap8"><button class="btn btn2" style="flex:1" id="btn-cancel">氓聫聳忙露聢</button><button class="btn" style="flex:1" id="btn-submit">莽隆庐猫庐陇猫庐掳猫麓娄</button></div>';
    }
  }

  // 忙聹卢氓卤聙猫庐掳氓陆聲
  if(sData.transactions&&sData.transactions.length>0){
    h+='<div class="c-card"><div class="c-title" style="font-size:13px;">忙聹卢氓卤聙猫庐掳氓陆聲</div>';
    (sData.transactions.slice(-8).reverse()).forEach(function(t){
      var s=t.winner+' 猫碌垄: '+(t.from||[]).map(function(f){return f.name+' '+f.amount}).join(', ');
      h+='<div style="font-size:12px;color:var(--text2);padding:2px 0;">'+esc(s)+'</div>';
    });
    h+='</div>';
  }

  h+='<button class="btn btn2" style="width:100%;" id="btn-stats">忙聦聣氓陇漏莽禄聼猫庐隆</button>';
  $('app').innerHTML=h;

  // 盲潞聥盲禄露
  $('btn-share').addEventListener('click',function(){
    showShareModal(room.code,link);
  });
  $('btn-leave').addEventListener('click',leaveRoom);
  $('btn-stats').addEventListener('click',function(){view='stats';render()});

  // 忙聳掳氓卤聙忙聦聣茅聮庐
  var bn=$('btn-new-round');
  if(bn)bn.addEventListener('click',async function(){
    var ups=JSON.parse(JSON.stringify(room.players));
    ups.forEach(function(p){p.score=0});
    try{
      await sbPatch(myRoomId,{players:ups,session_number:(room.session_number||1)+1,session_data:{transactions:[]},updated_at:new Date().toISOString()});
      selectedWinner=null;pollRoom();
      toast('忙聳掳氓卤聙氓录聙氓搂聥茂录聛','t-info');
    }catch(e){toast('忙聯聧盲陆聹氓陇卤猫麓楼','t-err')}
  });

  // 莽聨漏氓庐露莽聜鹿氓聡禄
  if(!selectedWinner&&room.status==='playing'){
    document.querySelectorAll('.p-card:not(.empty)').forEach(function(c){
      c.addEventListener('click',function(){
        var nm=this.dataset.player;
        selectedWinner=nm;renderRoom();
      });
    });
  }

  var bc=$('btn-cancel');if(bc)bc.addEventListener('click',function(){selectedWinner=null;renderRoom()});
  var bs=$('btn-submit');
  if(bs)bs.addEventListener('click',async function(){
    var inputs=document.querySelectorAll('.pay-input'),fromList=[],total=0;
    inputs.forEach(function(inp){var amt=parseInt(inp.value)||0;if(amt>0){fromList.push({name:inp.dataset.to,amount:amt});total+=amt}});
    if(fromList.length===0){toast('猫炉路猫聡鲁氓掳聭猫戮聯氓聟楼盲赂聙莽卢聰','t-err');return}
    var ups=JSON.parse(JSON.stringify(room.players));
    ups.forEach(function(p){
      if(p.name===selectedWinner)p.score=(p.score||0)+total;
      var fm=fromList.find(function(f){return f.name===p.name});if(fm)p.score=(p.score||0)-fm.amount;
    });
    var txn={winner:selectedWinner,from:fromList,created_at:new Date().toISOString()};
    var sd=JSON.parse(JSON.stringify(room.session_data||{transactions:[]}));sd.transactions.push(txn);
    var today=fmtDate(new Date()),ds=room.daily_stats||{};if(!ds[today])ds[today]={};
    ups.forEach(function(p){if(!p.active)return;var old=(room.players.find(function(x){return x.name===p.name})||{}).score||0;var diff=(p.score||0)-old;ds[today][p.name]=(ds[today][p.name]||0)+diff});
    var pd={players:ups,session_data:sd,daily_stats:ds,updated_at:new Date().toISOString()};
    var bankrupt=ups.some(function(p){return p.active&&(p.score||0)<=-2000});
    if(bankrupt){pd.session_number=(room.session_number||1)+1;ups.forEach(function(p){p.score=0});pd.players=ups;pd.session_data={transactions:[]}}
    try{await sbPatch(myRoomId,pd);selectedWinner=null;pollRoom();if(bankrupt)toast('氓路虏莽禄聯莽庐聴茂录聦忙聳掳氓卤聙氓录聙氓搂聥','t-info')}catch(e){toast('忙聫聬盲潞陇氓陇卤猫麓楼','t-err')}
  });
}

function showShareModal(code,link){
  var h='<div style="text-align:center;"><div class="label" style="font-size:15px;">忙聢驴茅聴麓莽聽聛 <b style="color:var(--gold);font-size:22px;letter-spacing:3px;">'+esc(code)+'</b></div>';
  h+='<div class="qr-box"><img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data='+encodeURIComponent(link)+'" alt="QR"></div>';
  h+='<p class="c-small mt8">氓戮庐盲驴隆忙聣芦盲赂聙忙聣芦氓聤聽氓聟楼忙聢驴茅聴麓</p>';
  h+='<button class="btn btn2" style="width:100%;margin-top:10px;" id="btn-copy-link">氓陇聧氓聢露茅聜聙猫炉路茅聯戮忙聨楼</button></div>';
  var o=el('div','modal-o');var m=el('div','modal',h);o.appendChild(m);
  $('app').appendChild(o);
  o.addEventListener('click',function(e){if(e.target===o)o.remove()});
  m.querySelector('#btn-copy-link').addEventListener('click',function(){
    navigator.clipboard.writeText(link).then(function(){toast('氓路虏氓陇聧氓聢露茅聯戮忙聨楼','t-ok')}).catch(function(){toast(link,'t-err')});
  });
}

async function leaveRoom(){
  if(!myRoomId||!myName){clearState();view='join';render();return}
  try{
    var room=await sbGet(myRoomId);if(!room){clearState();view='join';render();return}
    room.players=room.players.map(function(p){if(p.name===myName)return{name:p.name,score:p.score,position:p.position,active:false,joined:p.joined};return p});
    await sbPatch(myRoomId,{players:room.players,status:'waiting',updated_at:new Date().toISOString()});
    clearState();selectedWinner=null;view='join';render();
    toast('氓路虏茅聙聙氓聡潞','t-info');
  }catch(e){toast('茅聙聙氓聡潞氓陇卤猫麓楼','t-err')}
}

// ========== STATS ==========
function renderStats(){
  if(!myRoom){renderJoin();return}
  var room=myRoom,ds=room.daily_stats||{},dates=Object.keys(ds).sort().reverse();

  var h='<div class="row-b mb8"><b style="font-size:17px;">忙聦聣氓陇漏莽禄聼猫庐隆</b><button class="btn btn-sm btn2" id="btn-back">猫驴聰氓聸聻</button></div>';
  if(dates.length===0){h+='<div class="t-center" style="color:var(--text2);">忙職聜忙聴聽忙聲掳忙聧庐</div>'}
  else{
    dates.forEach(function(date){
      var d=ds[date],entries=Object.entries(d).sort(function(a,b){return b[1]-a[1]}),total=entries.reduce(function(s,x){return s+x[1]},0);
      h+='<div class="c-card"><div class="row-b mb8"><span style="font-weight:600;">'+date+'</span><span class="c-small">忙聙禄 '+fmt(total)+'</span></div>';
      entries.forEach(function(e){h+='<div class="row-b" style="padding:3px 0;"><span>'+esc(e[0])+'</span><span style="font-weight:600;color:'+(e[1]>=0?'var(--green)':'var(--red)')+';">'+fmt(e[1])+'</span></div>'});
      h+='</div>';
    });
  }
  $('app').innerHTML=h;
  $('btn-back').addEventListener('click',function(){view='room';render()});
}

// ========== INIT ==========
async function init(){
  var params=new URLSearchParams(location.search),urlCode=params.get('code');
  if(urlCode&&!myRoomId&&myName){
    try{
      var room=await sbGetByCode(urlCode.toUpperCase());
      if(room){
        var active=room.players.filter(function(p){return p.active});
        if(active.length>=4){toast('忙聢驴茅聴麓氓路虏忙禄隆','t-err');renderJoin();return}
        var replaced=false;
        room.players=room.players.map(function(p,idx){if(!p.active&&!replaced){replaced=true;return{name:myName,score:0,position:idx,active:true,joined:new Date().toISOString()}}return p});
        if(!replaced)room.players.push({name:myName,score:0,position:room.players.length,active:true,joined:new Date().toISOString()});
        active=room.players.filter(function(p){return p.active});
        room.status=active.length===4?'playing':'waiting';
        await sbPatch(room.id,{players:room.players,status:room.status,updated_at:new Date().toISOString()});
        myRoomId=room.id;saveState();view='room';startPoll();render();pollRoom();
        history.replaceState({},'',location.pathname);return;
      }
    }catch(e){}
  }
  if(myRoomId&&myName){view='room';startPoll();render();try{await pollRoom()}catch(e){}return}
  view='join';render();
}
init();
})();
</script>
